services:
  - type: web
    name: trackmmp
    runtime: node
    buildCommand: npm install && npm rebuild better-sqlite3
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/tracking.db
      - key: RENDER_EXTERNAL_URL
        value: https://trackmmp.onrender.com
      - key: TRACKING_DOMAIN
        value: https://trackmmp.onrender.com
    disk:
      name: trackmmp-data
      mountPath: /data
      sizeGB: 1
