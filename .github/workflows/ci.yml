name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 8

    env:
      NODE_ENV: development
      PORT: 3001
      JWT_SECRET: ci-only-not-a-real-secret-32chars-min
      ALLOW_DEV_PREVIEW_TOKEN: 1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check key files
        run: |
          node -c server.js
          for f in routes/*.js utils/*.js middleware/*.js db/*.js; do
            node -c "$f"
          done

      - name: Start server in background
        run: |
          node server.js > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/health > /dev/null; then
              echo "Server up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start"
          cat /tmp/server.log
          exit 1

      - name: Run smoke tests (boundary checks)
        run: npm run smoke:local

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill "$(cat /tmp/server.pid)" || true
          fi

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: /tmp/server.log
